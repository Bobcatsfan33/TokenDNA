name: TokenDNA — CI Pipeline

on:
  push:
    branches: [ master, main, "release/**" ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  security-events: write    # for CodeQL SARIF upload
  pull-requests: read

jobs:

  # ── Lint + Import Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Import Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Import verification
        run: |
          python -c "
          import importlib, sys
          mods = [
            'config', 'auth',
            'modules.tenants.models', 'modules.tenants.store', 'modules.tenants.middleware',
            'modules.identity.cache_redis', 'modules.identity.ml_model',
            'modules.identity.session_graph', 'modules.identity.async_pipeline',
            'modules.security.audit_log', 'modules.security.rbac', 'modules.security.headers',
            'onboarding.aws_connector',
          ]
          failed = []
          for m in mods:
            try: importlib.import_module(m)
            except Exception as e: failed.append(f'{m}: {e}')
          if failed:
            print('FAILED:', '\n'.join(failed))
            sys.exit(1)
          print(f'All {len(mods)} modules imported successfully')
          "

  # ── Dependency Vulnerability Scan ───────────────────────────────────────────
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json --output=pip-audit-results.json || true
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities"
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities — review pip-audit-results.json artifact"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  # ── CodeQL Static Analysis ──────────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ── Secret Scanning ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history for git log scanning

      - name: TruffleHog OSS — scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.94.0
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event.after || 'HEAD' }}
          extra_args: --only-verified

  # ── Docker Image Build Verification ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t aegis-tokendna:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "aegis-tokendna:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"           # advisory only — SARIF uploaded to Security tab
          ignore-unfixed: true     # only report CVEs that have an available fix
          vuln-type: "os,library"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Runtime load / security readiness ───────────────────────────────────────
  runtime-readiness:
    name: Runtime Readiness Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Start API for runtime readiness checks
        run: |
          DEV_MODE=true DATA_DB_PATH=/tmp/tokendna-ci.db AUDIT_LOG_PATH=/tmp/tokendna-ci-audit.jsonl python -m uvicorn api:app --host 127.0.0.1 --port 8000 > /tmp/tokendna-ci.log 2>&1 &
          for i in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=1); print('up')" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Run smoke load profile harness
        run: |
          python tests/load_security_smoke.py --base-url http://127.0.0.1:8000
          python scripts/load_profile.py --strict --max-p95-ms 1000

      - name: Operator SLO gate contract checks
        run: python scripts/operator_slo_gate.py --strict --skip-infra-deps

      - name: Run enterprise readiness tests
        run: |
          python -m pytest -q tests/test_enterprise_readiness.py tests/test_enterprise_api_operator.py

      - name: Stop API and upload runtime log
        if: always()
        run: |
          pkill -f "uvicorn api:app" || true
          cat /tmp/tokendna-ci.log || true

  # ── Adversarial security regression lane ───────────────────────────────────
  adversarial-security:
    name: Adversarial Security Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run adversarial harness (strict)
        run: python scripts/adversarial_harness.py --strict

      - name: Run adversarial harness tests
        run: python -m pytest -q tests/test_adversarial_harness.py

  # ── Policy regression gate lane ────────────────────────────────────────────
  policy-regression-gate:
    name: Policy Regression Gate
    runs-on: ubuntu-latest
    env:
      DATA_DB_PATH: /tmp/tokendna-policy-regression-ci.db
      ATTESTATION_CA_SECRET: policy-regression-ci-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Seed sample decision audits
        run: |
          python - <<'PY'
          import os
          from modules.identity import decision_audit

          db_path = os.environ["DATA_DB_PATH"]
          decision_audit.init_db()
          for i in range(25):
              decision_audit.record_decision(
                  tenant_id="tenant-1",
                  request_id=f"ci-req-{i}",
                  source_endpoint="/secure",
                  actor_subject="ci-user",
                  evaluation_input={
                      "uis_event": {"threat": {"risk_score": 92, "risk_tier": "allow"}},
                      "attestation": {
                          "attestation_id": f"att-{i}",
                          "what": {"soul_hash": "soul-1", "model_fingerprint": "model-1", "mcp_manifest_hash": "mcp-1"},
                          "how": {"dpop_bound": False, "mtls_bound": False},
                          "why": {"scope": ["orders:read"], "delegation_chain": ["svc-a"]},
                      },
                      "certificate": None,
                      "certificate_id": "",
                      "request_headers": {
                          "x-agent-soul-hash": "soul-1",
                          "x-agent-model-fingerprint": "model-1",
                          "x-agent-mcp-manifest-hash": "mcp-1",
                          "x-agent-delegation-chain": "svc-a",
                      },
                      "observed_scope": ["orders:read"],
                      "required_scope": [],
                  },
                  enforcement_result={
                      "decision": {"action": "allow", "reasons": ["policy_allow"], "policy_trace": {}},
                      "authn_failure": False,
                      "certificate_status": None,
                      "drift": {"score": 0.0, "severity": "none", "reasons": []},
                      "timing": {"elapsed_ms": 1.0, "slo_target_ms": 5.0, "slo_met": True},
                  },
              )
          print(f"seeded decision audits at {db_path}")
          PY

      - name: Run policy regression gate (strict)
        run: |
          POLICY_REGRESSION_TENANT_ID=tenant-1 \
          POLICY_REGRESSION_CANDIDATE_JSON='{}' \
          POLICY_REGRESSION_MAX_ACTION_DELTA_PCT=5.0 \
          POLICY_REGRESSION_MIN_SAMPLES=10 \
          python scripts/policy_regression_gate.py --strict

      - name: Run policy regression gate tests
        run: python -m pytest -q tests/test_policy_regression_gate.py
