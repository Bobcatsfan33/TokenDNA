name: TokenDNA — CI Pipeline

on:
  push:
    branches: [ master, main, "release/**" ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  security-events: write    # for CodeQL SARIF upload
  pull-requests: read

jobs:

  # ── Lint + Import Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Import Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Operator SLO gate contract checks
        run: python scripts/operator_slo_gate.py --strict

      - name: Import verification
        run: |
          python -c "
          import importlib, sys
          mods = [
            'config', 'auth',
            'modules.tenants.models', 'modules.tenants.store', 'modules.tenants.middleware',
            'modules.identity.cache_redis', 'modules.identity.ml_model',
            'modules.identity.session_graph', 'modules.identity.async_pipeline',
            'modules.security.audit_log', 'modules.security.rbac', 'modules.security.headers',
            'onboarding.aws_connector',
          ]
          failed = []
          for m in mods:
            try: importlib.import_module(m)
            except Exception as e: failed.append(f'{m}: {e}')
          if failed:
            print('FAILED:', '\n'.join(failed))
            sys.exit(1)
          print(f'All {len(mods)} modules imported successfully')
          "

  # ── Dependency Vulnerability Scan ───────────────────────────────────────────
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json --output=pip-audit-results.json || true
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities"
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities — review pip-audit-results.json artifact"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  # ── CodeQL Static Analysis ──────────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ── Secret Scanning ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history for git log scanning

      - name: TruffleHog OSS — scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.94.0
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event.after || 'HEAD' }}
          extra_args: --only-verified

  # ── Docker Image Build Verification ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t aegis-tokendna:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "aegis-tokendna:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true     # only fail on CVEs that have an available fix
          exit-code: "0"           # advisory only — SARIF uploaded to Security tab
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Runtime load / security readiness ───────────────────────────────────────
  runtime-readiness:
    name: Runtime Readiness Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start API for runtime readiness checks
        run: |
          DEV_MODE=true DATA_DB_PATH=/tmp/tokendna-ci.db python -m uvicorn api:app --host 127.0.0.1 --port 8000 > /tmp/tokendna-ci.log 2>&1 &
          for i in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=1); print('up')" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Run smoke load profile harness
        run: |
          python tests/load_security_smoke.py --base-url http://127.0.0.1:8000
          python scripts/load_profile.py --strict

      - name: Run enterprise readiness tests
        run: |
          python -m pytest -q tests/test_enterprise_readiness.py tests/test_enterprise_api_operator.py

      - name: Stop API and upload runtime log
        if: always()
        run: |
          pkill -f "uvicorn api:app" || true
          cat /tmp/tokendna-ci.log || true

  # ── Adversarial security regression lane ───────────────────────────────────
  adversarial-security:
    name: Adversarial Security Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run adversarial harness (strict)
        run: python scripts/adversarial_harness.py --strict

      - name: Run adversarial harness tests
        run: python -m pytest -q tests/test_adversarial_harness.py
