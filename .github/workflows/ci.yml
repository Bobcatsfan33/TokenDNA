name: TokenDNA — CI Pipeline

on:
  push:
    branches: [ master, main, "release/**" ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: read
  security-events: write    # for CodeQL SARIF upload
  pull-requests: read

jobs:

  # ── Lint + Import Check ─────────────────────────────────────────────────────
  lint:
    name: Lint & Import Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Import verification
        run: |
          python -c "
          import importlib, sys
          mods = [
            'config', 'auth',
            'modules.tenants.models', 'modules.tenants.store', 'modules.tenants.middleware',
            'modules.identity.cache_redis', 'modules.identity.ml_model',
            'modules.identity.session_graph', 'modules.identity.async_pipeline',
            'modules.security.audit_log', 'modules.security.rbac', 'modules.security.headers',
            'onboarding.aws_connector',
            'modules.identity.uis_narrative',
          ]
          failed = []
          for m in mods:
            try: importlib.import_module(m)
            except Exception as e: failed.append(f'{m}: {e}')
          if failed:
            print('FAILED:', '\n'.join(failed))
            sys.exit(1)
          print(f'All {len(mods)} modules imported successfully')
          "

  # ── Dependency Vulnerability Scan ───────────────────────────────────────────
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json --output=pip-audit-results.json || true
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities"
          pip-audit -r requirements.txt || echo "::warning::pip-audit found vulnerabilities — review pip-audit-results.json artifact"

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  # ── CodeQL Static Analysis ──────────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ── Secret Scanning ─────────────────────────────────────────────────────────
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0      # full history for git log scanning

      - name: TruffleHog OSS — scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.94.2
        with:
          path: ./
          base: ${{ github.event.before || github.event.repository.default_branch }}
          head: ${{ github.event.after || 'HEAD' }}
          extra_args: --only-verified

  # ── Docker Image Build Verification ─────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --no-cache -t aegis-tokendna:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "aegis-tokendna:ci"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"           # advisory only — SARIF uploaded to Security tab
          ignore-unfixed: true     # only report CVEs that have an available fix
          vuln-type: "os,library"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Runtime load / security readiness ───────────────────────────────────────
  runtime-readiness:
    name: Runtime Readiness Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Start API for runtime readiness checks
        run: |
          DEV_MODE=true DATA_DB_PATH=/tmp/tokendna-ci.db AUDIT_LOG_PATH=/tmp/tokendna-ci-audit.jsonl python -m uvicorn api:app --host 127.0.0.1 --port 8000 > /tmp/tokendna-ci.log 2>&1 &
          for i in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=1); print('up')" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

      - name: Run smoke load profile harness
        run: |
          python tests/load_security_smoke.py --base-url http://127.0.0.1:8000
          python scripts/load_profile.py --strict --max-p95-ms 1000

      - name: Operator SLO gate contract checks
        run: python scripts/operator_slo_gate.py --strict --skip-infra-deps

      - name: Run enterprise readiness tests
        run: |
          python -m pytest -q tests/test_enterprise_readiness.py tests/test_enterprise_api_operator.py

      - name: Stop API and upload runtime log
        if: always()
        run: |
          pkill -f "uvicorn api:app" || true
          cat /tmp/tokendna-ci.log || true

  # ── Adversarial security regression lane ───────────────────────────────────
  adversarial-security:
    name: Adversarial Security Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run adversarial harness (strict)
        run: python scripts/adversarial_harness.py --strict

      - name: Run adversarial harness tests
        run: python -m pytest -q tests/test_adversarial_harness.py

  # ── Policy regression gate lane ────────────────────────────────────────────
  policy-regression-gate:
    name: Policy Regression Gate
    runs-on: ubuntu-latest
    env:
      DATA_DB_PATH: /tmp/tokendna-policy-regression-ci.db
      ATTESTATION_CA_SECRET: policy-regression-ci-secret
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Seed sample decision audits
        run: |
          python - <<'PY'
          import os
          from modules.identity import decision_audit

          db_path = os.environ["DATA_DB_PATH"]
          decision_audit.init_db()
          for i in range(25):
              decision_audit.record_decision(
                  tenant_id="tenant-1",
                  request_id=f"ci-req-{i}",
                  source_endpoint="/secure",
                  actor_subject="ci-user",
                  evaluation_input={
                      "uis_event": {"threat": {"risk_score": 92, "risk_tier": "allow"}},
                      "attestation": {
                          "attestation_id": f"att-{i}",
                          "what": {"soul_hash": "soul-1", "model_fingerprint": "model-1", "mcp_manifest_hash": "mcp-1"},
                          "how": {"dpop_bound": False, "mtls_bound": False},
                          "why": {"scope": ["orders:read"], "delegation_chain": ["svc-a"]},
                      },
                      "certificate": None,
                      "certificate_id": "",
                      "request_headers": {
                          "x-agent-soul-hash": "soul-1",
                          "x-agent-model-fingerprint": "model-1",
                          "x-agent-mcp-manifest-hash": "mcp-1",
                          "x-agent-delegation-chain": "svc-a",
                      },
                      "observed_scope": ["orders:read"],
                      "required_scope": [],
                  },
                  enforcement_result={
                      "decision": {"action": "allow", "reasons": ["policy_allow"], "policy_trace": {}},
                      "authn_failure": False,
                      "certificate_status": None,
                      "drift": {"score": 0.0, "severity": "none", "reasons": []},
                      "timing": {"elapsed_ms": 1.0, "slo_target_ms": 5.0, "slo_met": True},
                  },
              )
          print(f"seeded decision audits at {db_path}")
          PY

      - name: Run policy regression gate (strict)
        run: |
          POLICY_REGRESSION_TENANT_ID=tenant-1 \
          POLICY_REGRESSION_CANDIDATE_JSON='{}' \
          POLICY_REGRESSION_MAX_ACTION_DELTA_PCT=5.0 \
          POLICY_REGRESSION_MIN_SAMPLES=10 \
          python scripts/policy_regression_gate.py --strict

      - name: Run policy regression gate tests
        run: python -m pytest -q tests/test_policy_regression_gate.py

  # ── Production secret gate ────────────────────────────────────────────────
  # Refuses to start when TOKENDNA_ENV=production and any HMAC secret is
  # missing, weak, or matches a published dev default.
  secret-gate:
    name: Production Secret Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Unit tests
        run: python -m pytest -q tests/test_secret_gate.py

      - name: Preflight (non-prod) — warns, does not fail
        run: python scripts/preflight_prod.py --environment dev || true

      - name: Preflight (production, no secrets) — must fail
        run: |
          set +e
          python scripts/preflight_prod.py --environment production
          rc=$?
          if [ "$rc" -eq 0 ]; then
            echo "Preflight unexpectedly passed without secrets — gate is broken."
            exit 1
          fi
          echo "Preflight failed as expected with rc=$rc"

      - name: Preflight (production, strong secrets) — must pass
        env:
          DEV_MODE: "false"
          OIDC_ISSUER: https://example.com
          OIDC_AUDIENCE: ci
          DNA_HMAC_KEY: ci-dna-hmac-key-32-bytes-aaaaaaaa
          AUDIT_HMAC_KEY: ci-audit-hmac-key-32-bytes-aaaaaa
          ATTESTATION_CA_KEY_ID: ci-key
          ATTESTATION_CA_SECRET: ci-attestation-secret-32-bytes-aa
        run: |
          export TOKENDNA_DELEGATION_SECRET=$(openssl rand -hex 32)
          export TOKENDNA_WORKFLOW_SECRET=$(openssl rand -hex 32)
          export TOKENDNA_HONEYPOT_SECRET=$(openssl rand -hex 32)
          export TOKENDNA_POSTURE_SECRET=$(openssl rand -hex 32)
          python scripts/preflight_prod.py --environment production

  # ── Postgres integration tests ────────────────────────────────────────────
  # Spins up an ephemeral Postgres, applies the Alembic baseline, and runs
  # the storage-layer test files against the real backend. Catches dialect
  # divergence before the runtime path goes live in production.
  postgres-integration:
    name: Postgres Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tokendna
          POSTGRES_PASSWORD: tokendna
          POSTGRES_DB: tokendna
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tokendna -d tokendna"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TOKENDNA_DB_BACKEND: postgres
      # `+psycopg` selects the psycopg v3 driver (we ship psycopg 3 in
      # requirements.txt, not the legacy psycopg2 default that SQLAlchemy
      # otherwise tries to import). Direct psycopg consumers normalise
      # this back to a plain libpq URI via normalize_dsn_for_psycopg().
      TOKENDNA_PG_DSN: postgresql+psycopg://tokendna:tokendna@localhost:5432/tokendna
      # Modules not yet ported to Postgres (attestation_store, agent_lifecycle,
      # mcp_inspector) fall back to SQLite. The default /data path isn't
      # writable on the runner, so point them at /tmp.
      DATA_DB_PATH: /tmp/tokendna-ci.db
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-prod.txt pytest

      - name: Apply Alembic baseline
        run: alembic upgrade head

      - name: Run a representative slice against Postgres
        run: |
          python -m pytest -q \
            tests/test_passport.py \
            tests/test_uis_store.py \
            tests/test_trust_graph.py \
            tests/test_delegation_receipt.py \
            tests/test_workflow_attestation.py \
            tests/test_policy_guard.py \
            tests/test_permission_drift.py

  # ── Helm chart lint + template validation ─────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: helm lint
        run: helm lint deploy/helm/tokendna

      - name: helm template (default values)
        run: helm template tokendna deploy/helm/tokendna > /tmp/rendered.yaml

      - name: helm template (production overlay)
        run: |
          helm template tokendna deploy/helm/tokendna \
            --set image.tag=ci-test \
            --set ingress.enabled=true \
            > /tmp/rendered-prod.yaml

      - name: Validate against Kubernetes schema (kubeconform)
        run: |
          curl -sSL -o /tmp/kc.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tgz -C /tmp
          /tmp/kubeconform -strict -summary /tmp/rendered.yaml /tmp/rendered-prod.yaml

  # ── Stress-harness smoke run ──────────────────────────────────────────────
  # Runs the stdlib stress driver against an in-process API for ~30s and
  # gates against the smoke threshold profile. Catches latency regressions
  # before they reach staging.
  stress-smoke:
    name: Stress Harness (smoke)
    runs-on: ubuntu-latest
    env:
      DATA_DB_PATH: /tmp/tokendna-stress-smoke.db
      DEV_MODE: "true"
      ATTESTATION_CA_SECRET: ci-stress-smoke-secret
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Boot API in background
        run: |
          uvicorn api:app --host 127.0.0.1 --port 8000 --log-level warning &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/healthz >/dev/null 2>&1; then
              echo "API up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Smoke stress run (gated)
        run: |
          python scripts/stress_harness.py \
            --base-url http://127.0.0.1:8000 \
            --profile scripts/stress_profiles/smoke.json \
            --duration 20 \
            --concurrency 8 \
            --gate scripts/stress_profiles/gate.smoke.json \
            --out /tmp/stress-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-report
          path: /tmp/stress-report.json
          if-no-files-found: ignore
