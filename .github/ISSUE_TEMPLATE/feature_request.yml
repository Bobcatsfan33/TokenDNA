name: Feature Request
description: Propose a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cloud Scanner (AWS/Azure/GCP)
        - Network Scanner
        - AI Remediation Agent
        - SIEM Integration
        - Dashboard / Analytics
        - Authentication / RBAC
        - FedRAMP / Compliance
        - TokenDNA Integration
        - Other
    validations:
      required: true
