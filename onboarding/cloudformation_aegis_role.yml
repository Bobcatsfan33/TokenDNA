AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Aegis Security Platform — Cross-Account Read Role
  Creates an IAM role that Aegis assumes (via STS) to scan your AWS account.
  The role grants READ-ONLY access to security-relevant services.
  Remediation actions (if enabled) require the separate AegisRemediationRole.

Parameters:
  AegisPlatformAccountId:
    Type: String
    Description: >
      The AWS Account ID of your Aegis deployment.
      Aegis will use this account to assume the role.
    AllowedPattern: "[0-9]{12}"

  ExternalId:
    Type: String
    Description: >
      Unique token generated by Aegis during onboarding wizard.
      Prevents confused-deputy attacks. Copy from your Aegis dashboard.
    MinLength: 32
    MaxLength: 128

  EnableRemediation:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      Set to true to also create AegisRemediationRole, which allows
      Aegis to automatically close ports, isolate hosts, and revoke credentials.
      Requires explicit approval in the Aegis dashboard for each action.

Conditions:
  CreateRemediationRole: !Equals [!Ref EnableRemediation, "true"]

Resources:

  # ── Scan Role (always created) ─────────────────────────────────────────────
  AegisScanRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AegisScanRole
      Description: Read-only role assumed by Aegis Security to scan this account
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AegisPlatformAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: AegisScanPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # EC2 — network & instance posture
              - Sid: EC2ReadOnly
                Effect: Allow
                Action:
                  - ec2:Describe*
                  - ec2:GetSecurityGroupsForVpc
                Resource: "*"
              # IAM — credential & permission audit
              - Sid: IAMReadOnly
                Effect: Allow
                Action:
                  - iam:Get*
                  - iam:List*
                  - iam:GenerateCredentialReport
                  - iam:GenerateServiceLastAccessedDetails
                Resource: "*"
              # S3 — bucket policy & public access audit
              - Sid: S3ReadOnly
                Effect: Allow
                Action:
                  - s3:GetBucketAcl
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketVersioning
                  - s3:GetBucketLogging
                  - s3:GetEncryptionConfiguration
                  - s3:ListAllMyBuckets
                Resource: "*"
              # RDS — database exposure audit
              - Sid: RDSReadOnly
                Effect: Allow
                Action:
                  - rds:Describe*
                Resource: "*"
              # CloudTrail — event log access
              - Sid: CloudTrailReadOnly
                Effect: Allow
                Action:
                  - cloudtrail:Describe*
                  - cloudtrail:Get*
                  - cloudtrail:List*
                  - cloudtrail:LookupEvents
                Resource: "*"
              # Config — compliance rules & drift
              - Sid: ConfigReadOnly
                Effect: Allow
                Action:
                  - config:Describe*
                  - config:Get*
                  - config:List*
                Resource: "*"
              # SecurityHub — existing findings aggregation
              - Sid: SecurityHubReadOnly
                Effect: Allow
                Action:
                  - securityhub:Get*
                  - securityhub:List*
                  - securityhub:Describe*
                Resource: "*"
              # GuardDuty — threat detection findings
              - Sid: GuardDutyReadOnly
                Effect: Allow
                Action:
                  - guardduty:Get*
                  - guardduty:List*
                Resource: "*"
              # Lambda & ECS — serverless/container exposure
              - Sid: ComputeReadOnly
                Effect: Allow
                Action:
                  - lambda:List*
                  - lambda:Get*
                  - ecs:Describe*
                  - ecs:List*
                  - eks:Describe*
                  - eks:List*
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: AegisSecurity
        - Key: Purpose
          Value: SecurityScan

  # ── Remediation Role (optional) ───────────────────────────────────────────
  AegisRemediationRole:
    Type: AWS::IAM::Role
    Condition: CreateRemediationRole
    Properties:
      RoleName: AegisRemediationRole
      Description: >
        Limited remediation role for Aegis. Each action requires explicit
        approval via the Aegis dashboard before execution.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AegisPlatformAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 900   # 15 minutes — short-lived remediation sessions
      Policies:
        - PolicyName: AegisRemediationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Close security group ports
              - Sid: SGRemediation
                Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                Resource: "*"
              # Quarantine an instance (attach deny-all SG)
              - Sid: InstanceQuarantine
                Effect: Allow
                Action:
                  - ec2:ModifyInstanceAttribute
                Resource: "*"
              # Disable IAM access keys (kick compromised user)
              - Sid: IAMKeyRotation
                Effect: Allow
                Action:
                  - iam:UpdateAccessKey
                  - iam:DeleteAccessKey
                  - iam:DeactivateMFADevice
                Resource: "*"
              # S3 — remove public ACLs
              - Sid: S3Remediation
                Effect: Allow
                Action:
                  - s3:PutBucketAcl
                  - s3:PutBucketPublicAccessBlock
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: AegisSecurity
        - Key: Purpose
          Value: SecurityRemediation

Outputs:
  ScanRoleArn:
    Description: Paste this ARN into the Aegis onboarding wizard
    Value: !GetAtt AegisScanRole.Arn
    Export:
      Name: AegisScanRoleArn

  RemediationRoleArn:
    Condition: CreateRemediationRole
    Description: Paste this ARN into the Aegis remediation settings
    Value: !GetAtt AegisRemediationRole.Arn
    Export:
      Name: AegisRemediationRoleArn
