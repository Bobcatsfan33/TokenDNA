version: "3.9"

# TokenDNA — Full stack: app + Redis + ClickHouse
#
# Quick start:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
#   docker compose logs -f tokendna

services:

  # ── TokenDNA API ─────────────────────────────────────────────────────────────
  tokendna:
    build:
      context: .
      dockerfile: Dockerfile
    image: tokendna:latest
    container_name: tokendna
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override service hostnames so the app resolves to Docker network aliases
      REDIS_HOST: redis
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - tokendna_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: tokendna_redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - tokendna_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── ClickHouse ────────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.4-alpine
    container_name: tokendna_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: tokendna
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      # Set a password here and mirror it in your .env CLICKHOUSE_PASSWORD
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"   # HTTP interface (localhost only)
      - "127.0.0.1:9000:9000"   # Native TCP interface (localhost only)
    networks:
      - tokendna_net
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  redis_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

networks:
  tokendna_net:
    driver: bridge
