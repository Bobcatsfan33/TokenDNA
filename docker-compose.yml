# TokenDNA — Production-hardened docker-compose
# FedRAMP High / IL6 container hardening: CIS Docker Benchmark v1.6
#
# BEFORE STARTING: copy .env.example to .env and fill in all secrets.
# Never commit .env to git.
#
# Security controls applied:
#   - No container runs as root (user: directive)
#   - read_only: true prevents container filesystem writes
#   - no-new-privileges: true blocks privilege escalation
#   - cap_drop: ALL removes all Linux capabilities (add back only what's needed)
#   - Resource limits prevent DoS via resource exhaustion
#   - Internal network: app ↔ redis ↔ clickhouse never exposed externally
#   - Redis requires password authentication
#   - ClickHouse requires password authentication
#   - Ports bound to 127.0.0.1 (not 0.0.0.0) — reverse proxy required for production

version: "3.9"

networks:
  aegis-internal:
    driver: bridge
    internal: true          # no external internet access for data tier
  aegis-edge:
    driver: bridge           # app tier — internet-facing (behind reverse proxy)

secrets:
  redis_password:
    environment: REDIS_PASSWORD
  clickhouse_password:
    environment: CLICKHOUSE_PASSWORD

services:

  # ── TokenDNA API ────────────────────────────────────────────────────────────
  tokendna:
    build: .
    image: aegis-security/tokendna:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/log/aegis:size=256m
    security_opt:
      - no-new-privileges:true
      - seccomp:seccomp-profile.json
    cap_drop:
      - ALL
    networks:
      - aegis-internal
      - aegis-edge
    ports:
      - "127.0.0.1:8000:8000"    # bind localhost only — put nginx/caddy in front
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_TLS=false           # set true when using Redis TLS
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_SECURE=false   # set true for TLS
      - AUDIT_BACKEND=all
      - AUDIT_LOG_PATH=/var/log/aegis/audit.jsonl
      - ENVIRONMENT=production
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - aegis-internal
    # NO external port exposure — only reachable by tokendna container
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
      --protected-mode yes
      --bind 0.0.0.0
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 320M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── ClickHouse ───────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_NICE       # ClickHouse uses nice() for I/O scheduling
      - IPC_LOCK       # memory-mapped files
    networks:
      - aegis-internal
    # NO external port exposure
    environment:
      CLICKHOUSE_DB:               tokendna
      CLICKHOUSE_USER:             tokendna
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    env_file:
      - .env
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider",
             "http://localhost:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  redis-data:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local
