# TokenDNA — Production overlay
#
# Intended use:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# This overlay:
#   1. Adds a Postgres service (production-required).
#   2. Sets DATABASE_URL and DATA_BACKEND=postgres on the api container.
#   3. Wires TOKENDNA_ENV=production so modules/security/secret_gate.py
#      enforces real HMAC secrets at startup.
#   4. Requires every TOKENDNA_*_SECRET env var to be supplied via .env or
#      a secrets backend — there is no fallback in this overlay.

version: "3.9"

services:

  tokendna:
    environment:
      - TOKENDNA_ENV=production
      - DATA_BACKEND=postgres
      - DATABASE_URL=postgresql://tokendna:${POSTGRES_PASSWORD}@postgres:5432/tokendna
      # The four production HMAC secrets — these MUST come from the host
      # environment or a secret manager. The secret_gate refuses to start
      # if any of them are unset, short, or the published dev defaults.
      - TOKENDNA_DELEGATION_SECRET=${TOKENDNA_DELEGATION_SECRET}
      - TOKENDNA_WORKFLOW_SECRET=${TOKENDNA_WORKFLOW_SECRET}
      - TOKENDNA_HONEYPOT_SECRET=${TOKENDNA_HONEYPOT_SECRET}
      - TOKENDNA_POSTURE_SECRET=${TOKENDNA_POSTURE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - aegis-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_DB: tokendna
      POSTGRES_USER: tokendna
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Fail-closed: the Postgres image refuses to start without a password.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokendna -d tokendna"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres-data:
    driver: local
