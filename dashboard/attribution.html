<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aegis — Attribution Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
:root {
  --bg:       #070b12;
  --surface:  #0e1520;
  --surface2: #151f30;
  --surface3: #1a2540;
  --border:   #1e2d45;
  --accent:   #3b82f6;
  --accent2:  #6366f1;
  --green:    #10b981;
  --yellow:   #f59e0b;
  --orange:   #f97316;
  --red:      #ef4444;
  --red2:     #dc2626;
  --purple:   #a855f7;
  --cyan:     #06b6d4;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --font:     'Inter', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

.shell { display: flex; min-height: 100vh; }
.sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
.topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 50; }
.content { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 20px; }

.logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
.logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.logo-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
.logo-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

.nav-section { padding: 12px 0 4px; }
.nav-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: var(--muted); font-size: 13px; border-left: 3px solid transparent; transition: all .15s; text-decoration: none; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--red); border-left-color: var(--red); background: rgba(239,68,68,.07); }
.nav-icon { width: 16px; text-align: center; font-size: 14px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.card-header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.card-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; }
.card-body { padding: 16px 20px 20px; }

.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
@media(max-width:1200px) { .grid-4{grid-template-columns:repeat(2,1fr)} .grid-1-2{grid-template-columns:1fr} }
@media(max-width:720px)  { .grid-4,.grid-2,.grid-3,.grid-1-2{grid-template-columns:1fr} }

.stat-card { padding: 20px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); position: relative; overflow: hidden; }
.stat-card::before { content:''; position:absolute; inset:0; background: linear-gradient(135deg, var(--accent-glow,transparent) 0%, transparent 60%); pointer-events: none; border-radius: 10px; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
.stat-value { font-size: 36px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
.stat-sub   { font-size: 11px; margin-top: 6px; color: var(--muted); }
.stat-card.danger  { border-color: rgba(239,68,68,.35); --accent-glow: rgba(239,68,68,.08); }
.stat-card.warn    { border-color: rgba(245,158,11,.3); --accent-glow: rgba(245,158,11,.06); }
.stat-card.info    { border-color: rgba(59,130,246,.3); --accent-glow: rgba(59,130,246,.06); }
.stat-card.ok      { border-color: rgba(16,185,129,.3); --accent-glow: rgba(16,185,129,.06); }

.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 99px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
.badge-allow   { background: rgba(16,185,129,.15); color: var(--green); }
.badge-enrich  { background: rgba(59,130,246,.15); color: var(--accent); }
.badge-stepup  { background: rgba(245,158,11,.15); color: var(--yellow); }
.badge-deny    { background: rgba(239,68,68,.15); color: var(--red); }
.badge-crit    { background: rgba(239,68,68,.15); color: var(--red); }
.badge-high    { background: rgba(249,115,22,.15); color: var(--orange); }
.badge-med     { background: rgba(245,158,11,.15); color: var(--yellow); }
.badge-low     { background: rgba(16,185,129,.15); color: var(--green); }
.badge-ip      { background: rgba(168,85,247,.15); color: var(--purple); }
.badge-asn     { background: rgba(6,182,212,.15); color: var(--cyan); }
.badge-ua      { background: rgba(100,116,139,.15); color: var(--muted); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }

.bar-track { background: var(--surface3); border-radius: 99px; height: 6px; flex: 1; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
.row-bar { display: flex; align-items: center; gap: 10px; }
.row-label { font-size: 12px; white-space: nowrap; width: 120px; overflow: hidden; text-overflow: ellipsis; }
.row-count { font-size: 12px; color: var(--muted); min-width: 32px; text-align: right; }

.kill-chain { display: flex; gap: 0; overflow-x: auto; }
.kc-stage { flex: 1; min-width: 80px; padding: 14px 10px; text-align: center; border-right: 1px solid var(--border); position: relative; cursor: default; transition: background .15s; }
.kc-stage:last-child { border-right: none; }
.kc-stage:hover { background: var(--surface2); }
.kc-stage-name { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 8px; }
.kc-count { font-size: 24px; font-weight: 800; }
.kc-count.active { color: var(--red); text-shadow: 0 0 12px rgba(239,68,68,.4); }
.kc-count.zero   { color: var(--surface3); }
.kc-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--red); transform-origin: left; transition: transform .4s ease; }

.signal-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.signal-row:last-child { border-bottom: none; }
.signal-name { font-size: 12px; width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.signal-bar-wrap { flex: 1; }

.mitre-tag { display: inline-flex; align-items: center; background: var(--surface3); border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; font-size: 11px; font-family: monospace; gap: 6px; margin: 2px; }
.mitre-stage { font-size: 9px; color: var(--muted); text-transform: uppercase; }

.conf-ring { width: 36px; height: 36px; flex-shrink: 0; }

.ioc-value { font-family: monospace; font-size: 12px; word-break: break-all; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); }
.btn-danger:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,.08); }

.topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
.topbar-badge { background: rgba(239,68,68,.15); color: var(--red); padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
.refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; }
.refresh-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
.status-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.section-title { font-size: 13px; font-weight: 600; }

.profile-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.profile-row:last-child { border-bottom: none; }
.profile-ip { font-family: monospace; font-size: 13px; font-weight: 600; min-width: 130px; }
.profile-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.profile-tech { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.tech-tag { background: var(--surface3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 10px; font-family: monospace; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .4; }
.empty-msg { font-size: 13px; }

.conf-bar { height: 4px; border-radius: 99px; background: var(--surface3); overflow: hidden; margin-top: 4px; }
.conf-fill { height: 100%; border-radius: 99px; }

.tab-row { display: flex; gap: 2px; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab { padding: 10px 16px; font-size: 12px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

.tooltip { position: relative; cursor: help; }
.tooltip:hover::after { content: attr(data-tip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); color: var(--text); font-size: 11px; padding: 5px 10px; border-radius: 6px; white-space: nowrap; z-index: 999; }
</style>
</head>

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtDate = s => s ? new Date(s).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"2-digit"}) : "—";
const fmtTime = s => s ? new Date(s).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "—";
const fmtAge = s => { if(!s) return "—"; const h=s/3600; return h<1?`${Math.round(s/60)}m`:`${h.toFixed(1)}h`; };
const confColor = c => c>=0.8?C.red:c>=0.5?C.orange:C.yellow;
const decBadge = d => ({allow:"badge-allow",enrich:"badge-enrich",step_up:"badge-stepup",deny:"badge-deny"}[d]||"badge-allow");

// ── Components ────────────────────────────────────────────────────────────────

function ConfBar({value}) {
  return React.createElement("div",{style:{width:80}},
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6}},
      React.createElement("div",{className:"bar-track",style:{height:5}},
        React.createElement("div",{className:"bar-fill",style:{width:`${value*100}%`,background:confColor(value)}})
      ),
      React.createElement("span",{style:{fontSize:10,color:confColor(value),minWidth:28}},(value*100).toFixed(0)+"%")
    )
  );
}

function KpiCard({label,value,sub,variant="info",icon}) {
  return React.createElement("div",{className:`stat-card ${variant}`},
    React.createElement("div",{className:"stat-label"},label),
    React.createElement("div",{style:{display:"flex",alignItems:"baseline",gap:10}},
      icon && React.createElement("span",{style:{fontSize:20}},"icon"),
      React.createElement("div",{className:"stat-value",style:{color:variant==="danger"?C.red:variant==="warn"?C.yellow:variant==="ok"?C.green:C.blue}},
        typeof value === "number" ? value.toLocaleString() : value
      )
    ),
    sub && React.createElement("div",{className:"stat-sub"},sub)
  );
}

function KillChain({dist}) {
  const stages = ["initial-access","credential-access","privilege-escalation","lateral-movement","collection","exfiltration","defense-evasion"];
  const max = Math.max(...stages.map(s=>dist[s]||0), 1);
  return React.createElement("div",{className:"kill-chain"},
    stages.map(s=>{
      const count = dist[s]||0;
      const pct = count/max;
      const color = KC_COLORS[s]||C.muted;
      const label = s.replace(/-/g,"\u00AD").replace("access","access").replace("escalation","escal.");
      return React.createElement("div",{key:s,className:"kc-stage",style:{background:count>0?`${color}08`:"transparent"}},
        React.createElement("div",{className:"kc-stage-name",style:{color:count>0?color:undefined}},
          s.split("-").map(w=>w[0].toUpperCase()+w.slice(1)).join("\u200B ")
        ),
        React.createElement("div",{className:`kc-count ${count>0?"active":"zero"}`,style:{color:count>0?color:"#1e2d45"}},count),
        count>0 && React.createElement("div",{className:"kc-bar",style:{background:color,transform:`scaleX(${pct})`}})
      );
    })
  );
}

function SignalBars({signals}) {
  const max = Math.max(...signals.map(s=>s.count), 1);
  const colors = [C.red,C.orange,C.yellow,C.green,C.blue,C.indigo,C.purple,C.cyan];

function IOCTable({iocs}) {
  const [filter, setFilter] = useState("");
  const [typeFilter, setTypeFilter] = useState("all");

  const filtered = iocs.filter(i=>{
    const matchType = typeFilter==="all" || i.ioc_type===typeFilter;
    const matchStr  = !filter || i.value.toLowerCase().includes(filter.toLowerCase()) || i.context.toLowerCase().includes(filter.toLowerCase());
    return matchType && matchStr;
  });

  const exportCSV = () => {
    const rows = [["Type","Value","Confidence","Hit Count","First Seen","Last Seen","Context"]];
    filtered.forEach(i=>rows.push([i.ioc_type,i.value,i.confidence,i.hit_count,i.first_seen,i.last_seen,`"${i.context}"`]));
    const blob = new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"});
    const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="aegis-iocs.csv"; a.click();
  };

  const typeLabel = {ip:"badge-ip",asn:"badge-asn",user_agent:"badge-ua"};

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
    React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
      React.createElement("input",{
        type:"text",placeholder:"Filter IOCs…",value:filter,
        onChange:e=>setFilter(e.target.value),
        style:{flex:1,minWidth:180,background:"#0e1520",border:"1px solid #1e2d45",borderRadius:6,padding:"6px 12px",color:"#e2e8f0",fontSize:12,outline:"none"}
      }),
      ["all","ip","asn","user_agent"].map(t=>
        React.createElement("button",{key:t,className:`btn${typeFilter===t?" active":""}`,onClick:()=>setTypeFilter(t),
          style:{background:typeFilter===t?"#1a2540":"#0e1520",borderColor:typeFilter===t?"#3b82f6":"#1e2d45"}},
          t==="user_agent"?"UA":t.toUpperCase()
        )
      ),
      React.createElement("button",{className:"btn",onClick:exportCSV},"⬇ Export CSV")
    ),
    React.createElement("div",{className:"table-wrap"},
      React.createElement("table",null,
        React.createElement("thead",null,
          React.createElement("tr",null,
            ["Type","Value","Confidence","Hits","First Seen","Context"].map(h=>
              React.createElement("th",{key:h},h)
            )
          )
        ),
        React.createElement("tbody",null,
          filtered.slice(0,100).map((ioc,i)=>
            React.createElement("tr",{key:i},
              React.createElement("td",null,React.createElement("span",{className:`badge ${typeLabel[ioc.ioc_type]||"badge-low"}`},ioc.ioc_type.replace("_"," "))),
              React.createElement("td",null,React.createElement("span",{className:"ioc-value"},ioc.value)),
              React.createElement("td",null,React.createElement(ConfBar,{value:ioc.confidence})),
              React.createElement("td",null,ioc.hit_count),
              React.createElement("td",{style:{fontSize:11,color:"#64748b"}},fmtDate(ioc.first_seen)),
              React.createElement("td",{style:{fontSize:11,color:"#94a3b8",maxWidth:300}},ioc.context)
            )
          )
        )
      )
    ),
    filtered.length === 0 && React.createElement("div",{className:"empty-state"},
      React.createElement("div",{className:"empty-msg"},"No IOCs match the current filter.")
    )
  );
}
