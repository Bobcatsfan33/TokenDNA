<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TokenDNA — Runtime Risk Engine</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
  :root {
    --bg:       #060a10;
    --surface:  #0d1117;
    --surface2: #161b22;
    --surface3: #1c2333;
    --border:   #21262d;
    --accent:   #3b82f6;
    --accent2:  #6366f1;
    --green:    #10b981;
    --yellow:   #f59e0b;
    --orange:   #f97316;
    --red:      #ef4444;
    --critical: #dc2626;
    --text:     #e6edf3;
    --muted:    #7d8590;
    --font:     'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

  /* Layout */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 236px; min-width: 236px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .main { margin-left: 236px; flex: 1; display: flex; flex-direction: column; }
  .topbar { height: 58px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 16px; position: sticky; top: 0; z-index: 50; }
  .content { padding: 28px; flex: 1; max-width: 1400px; }

  /* Sidebar */
  .logo { padding: 22px 18px 18px; border-bottom: 1px solid var(--border); }
  .logo-brand { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
  .logo-brand span { color: var(--accent); }
  .logo-tag { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 3px; }
  .nav-group { padding: 14px 0 4px; }
  .nav-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 18px 8px; font-weight: 600; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; cursor: pointer; color: var(--muted); font-size: 13px; border-left: 3px solid transparent; transition: all .12s; white-space: nowrap; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,.08); font-weight: 500; }
  .nav-icon { width: 18px; text-align: center; font-size: 15px; flex-shrink: 0; }

  /* Topbar */
  .topbar-title { font-size: 15px; font-weight: 600; }
  .status-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; color: white; }

  /* Sections */
  .section-head { margin-bottom: 24px; }
  .section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .section-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* KPI grid */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.yellow { color: var(--yellow); }
  .kpi-value.blue { color: var(--accent); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .card-head { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-body { padding: 20px; }
  .card-hint { font-size: 11px; color: var(--muted); }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* Severity badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .badge.critical { background: rgba(220,38,38,.2); color: #fca5a5; border: 1px solid rgba(220,38,38,.3); }
  .badge.high { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.25); }
  .badge.medium { background: rgba(245,158,11,.15); color: #fcd34d; border: 1px solid rgba(245,158,11,.25); }
  .badge.low { background: rgba(16,185,129,.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }
  .badge.info { background: rgba(59,130,246,.12); color: #93c5fd; border: 1px solid rgba(59,130,246,.2); }

  /* Blast radius viz */
  .blast-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .blast-viz { background: var(--surface2); border-radius: 8px; padding: 20px; min-height: 280px; display: flex; flex-direction: column; }
  .score-ring { width: 140px; height: 140px; margin: 0 auto 16px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .score-num { font-size: 32px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
  .score-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }
  .node-list { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; max-height: 200px; }
  .node-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--surface3); border-radius: 6px; }
  .node-type { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 1px 6px; border-radius: 3px; min-width: 60px; text-align: center; }
  .nt-agent { background: rgba(99,102,241,.2); color: #a5b4fc; }
  .nt-issuer { background: rgba(245,158,11,.15); color: #fcd34d; }
  .nt-verifier { background: rgba(239,68,68,.15); color: #fca5a5; }
  .nt-tool { background: rgba(16,185,129,.12); color: #6ee7b7; }
  .nt-workload { background: rgba(59,130,246,.12); color: #93c5fd; }
  .hop-pip { width: 20px; height: 20px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
  .node-label { font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .node-pts { font-size: 11px; color: var(--muted); }

  /* Intent feed */
  .intent-row { border-left: 3px solid; padding: 12px 16px; margin-bottom: 8px; border-radius: 0 6px 6px 0; background: var(--surface2); }
  .intent-row.critical { border-color: var(--critical); }
  .intent-row.high { border-color: var(--red); }
  .intent-row.medium { border-color: var(--yellow); }
  .intent-row.low { border-color: var(--green); }
  .intent-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
  .intent-meta { font-size: 11px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .conf-bar { display: flex; align-items: center; gap: 6px; }
  .conf-track { width: 80px; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .conf-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  /* Graph viz */
  .graph-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .gstat { background: var(--surface2); border-radius: 8px; padding: 14px 16px; }
  .gstat-num { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
  .gstat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .type-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 12px; }
  .type-fill { height: 6px; border-radius: 3px; min-width: 4px; transition: width .3s; }
  .type-val { color: var(--muted); font-size: 11px; min-width: 24px; }

  /* Anomaly stream */
  .anomaly-card { padding: 10px 14px; background: var(--surface2); border-radius: 6px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 10px; }
  .anomaly-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .anomaly-body { flex: 1; min-width: 0; }
  .anomaly-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--yellow); margin-bottom: 2px; }
  .anomaly-detail { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .anomaly-subject { font-size: 11px; color: var(--accent); }

  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-msg { font-size: 14px; margin-bottom: 6px; }
  .empty-hint { font-size: 12px; opacity: .7; }

  /* Misc */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .mono { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 12px; }
  .text-muted { color: var(--muted); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .flex-row { display: flex; align-items: center; gap: 8px; }
  .ml-auto { margin-left: auto; }
  .chip { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; background: var(--surface3); color: var(--muted); }
  .playbook-row { padding: 10px 14px; background: var(--surface2); border-radius: 6px; margin-bottom: 6px; }
  .pb-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .pb-meta { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }
  .loading { color: var(--muted); font-size: 13px; padding: 32px; text-align: center; }

  /* ── UIS Event Inspector Modal ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding: 24px; overflow-y: auto; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 900px; min-height: 60vh; display: flex; flex-direction: column; margin: auto; }
  .modal-head { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 16px; }
  .modal-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; flex: 1; }
  .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; flex-shrink: 0; transition: all .12s; }
  .modal-close:hover { color: var(--text); border-color: var(--muted); }
  .modal-tabs { display: flex; gap: 0; padding: 0 24px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .modal-tab { padding: 10px 14px; font-size: 12px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); white-space: nowrap; transition: all .12s; }
  .modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .modal-tab:hover:not(.active) { color: var(--text); }
  .modal-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
  .schema-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .schema-row { display: flex; align-items: flex-start; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .schema-row:last-child { border-bottom: none; }
  .schema-key { font-size: 12px; font-family: 'SF Mono','Cascadia Code',monospace; font-weight: 600; min-width: 180px; flex-shrink: 0; }
  .schema-val { font-size: 12px; color: var(--text); word-break: break-all; }
  .schema-null { color: var(--muted); font-style: italic; }
  .binding-highlight { background: rgba(99,102,241,.12); border-radius: 4px; padding: 2px 6px; border: 1px solid rgba(99,102,241,.25); }
  .risk-gauge { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .gauge-track { flex: 1; height: 10px; background: var(--surface3); border-radius: 5px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 5px; transition: width .4s; }
  .indicator-chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); margin: 2px; }
  .travel-warn { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); border-radius: 6px; padding: 10px 14px; color: #fca5a5; font-size: 13px; font-weight: 600; margin-bottom: 12px; }

  /* ── Identity Card Page ── */
  .icard-grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; margin-bottom: 20px; }
  .icard-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
  .icard-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .icard-meta { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .icard-section { margin-bottom: 14px; }
  .icard-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; }
  .timeline-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface2); border-radius: 6px; margin-bottom: 4px; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--accent); }
  .sparkline-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }

  /* ── ZTIX Exchange Page ── */
  .ztix-timeline { display: flex; flex-direction: column; gap: 0; }
  .ztix-step { display: flex; gap: 16px; opacity: 0; transition: opacity .4s; }
  .ztix-step.visible { opacity: 1; }
  .ztix-step-line { display: flex; flex-direction: column; align-items: center; }
  .ztix-step-num { width: 34px; height: 34px; border-radius: 50%; background: var(--surface3); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--muted); flex-shrink: 0; transition: all .3s; }
  .ztix-step-num.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 12px rgba(59,130,246,.4); }
  .ztix-step-connector { width: 2px; flex: 1; min-height: 24px; background: var(--border); margin: 4px 0; }
  .ztix-step-body { flex: 1; padding-bottom: 24px; }
  .ztix-step-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .ztix-step-desc { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .ztix-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .ztix-check { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
  .ztix-check-pass { color: var(--green); }
  .ztix-check-fail { color: var(--red); }
  .ztix-token-card { background: linear-gradient(135deg, rgba(59,130,246,.12) 0%, rgba(99,102,241,.08) 100%); border: 1px solid rgba(59,130,246,.25); border-radius: 8px; padding: 16px; }
  .ztix-mode-btn { padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); transition: all .12s; }
  .ztix-mode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Upsell modal — fires on tier-403 from any apiFetch() call */
  .upsell-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
  .upsell-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: min(520px, 92vw); padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.55); }
  .upsell-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
  .upsell-title { font-size: 22px; font-weight: 700; margin-top: 6px; }
  .upsell-message { color: var(--muted); margin-top: 10px; line-height: 1.55; }
  .upsell-tiers { display: flex; gap: 10px; margin-top: 18px; }
  .upsell-tier-pill { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); }
  .upsell-tier-pill.required { border-color: rgba(59,130,246,.5); background: rgba(59,130,246,.08); }
  .upsell-tier-label { font-size: 11px; color: var(--muted); }
  .upsell-tier-value { font-size: 14px; font-weight: 600; margin-top: 2px; text-transform: capitalize; }
  .upsell-actions { display: flex; gap: 10px; margin-top: 22px; }
  .upsell-btn { flex: 1; padding: 10px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); }
  .upsell-btn.primary { background: var(--accent); border-color: var(--accent); color: white; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
  .upsell-btn.primary:hover { background: var(--accent2); }

  /* Generic page scaffold for the expansion-feature surfaces */
  .page { padding: 24px 28px; max-width: 1280px; }
  .page-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .page-section { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 28px; margin-bottom: 12px; }
  .data-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .data-table thead { background: var(--surface2); }
  .data-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--border); }
  .data-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover { background: var(--surface2); }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { createElement: h, useState, useEffect, useRef } = React;
const API_BASE = "";

// ── Data fetching ─────────────────────────────────────────────────────────────
// apiFetch wraps fetch and dispatches a window event when the server returns
// a 403 with {error: "feature_not_entitled", ...}; the UpsellModal listens
// for that event and renders the upgrade CTA.
async function apiFetch(path, opts = {}) {
  const headers = { "X-API-Key": "demo-key", ...(opts.headers || {}) };
  const r = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  if (r.status === 403) {
    try {
      const cloned = r.clone();
      const body = await cloned.json();
      const detail = body && body.detail;
      if (detail && detail.error === "feature_not_entitled") {
        window.dispatchEvent(new CustomEvent("tokendna:upsell", { detail }));
      }
    } catch(e) { /* non-JSON 403 — caller handles it */ }
  }
  return r;
}

function useApi(path, fallback, interval = 0) {
  const [data, setData] = useState(fallback);
  const [loading, setLoading] = useState(true);
  const fetch_ = async () => {
    try {
      const r = await apiFetch(path);
      if (r.ok) setData(await r.json());
    } catch(e) {}
    finally { setLoading(false); }
  };
  useEffect(() => {
    fetch_();
    if (interval > 0) { const t = setInterval(fetch_, interval); return () => clearInterval(t); }
  }, [path]);
  return [data, loading];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const SEV_COLOR = { critical: "#dc2626", high: "#ef4444", medium: "#f59e0b", low: "#10b981" };

function Badge({ sev }) {
  return h("span", { className: `badge ${sev}` }, sev);
}

function ConfBar({ v }) {
  const pct = Math.round(v * 100);
  const color = v >= .7 ? "#ef4444" : v >= .5 ? "#f59e0b" : "#3b82f6";
  return h("div", { className: "conf-bar" },
    h("div", { className: "conf-track" }, h("div", { className: "conf-fill", style: { width: pct+"%", background: color } })),
    h("span", { className: "text-muted", style: { fontSize:11 } }, pct+"%"),
  );
}

function ts(iso) {
  if (!iso) return "—";
  try { return new Date(iso).toLocaleTimeString(); } catch { return iso.slice(11,19); }
}

function ago(iso) {
  if (!iso) return "—";
  try {
    const diff = Date.now() - new Date(iso).getTime();
    if (diff < 60000) return "just now";
    if (diff < 3600000) return `${Math.round(diff/60000)}m ago`;
    return `${Math.round(diff/3600000)}h ago`;
  } catch { return iso.slice(11,19); }
}

// Simple force-directed layout (no external library)
function forceLayout(nodes, edges, width, height, iterations) {
  // Initialise positions in a circle
  const pos = {};
  const cx = width / 2, cy = height / 2, r = Math.min(width, height) * 0.35;
  nodes.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / nodes.length;
    pos[n.node_id] = { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle), vx: 0, vy: 0 };
  });
  const edgeSet = edges.map(e => ({ s: e.src_node, d: e.dst_node }));
  const k = Math.sqrt((width * height) / Math.max(nodes.length, 1));
  for (let iter = 0; iter < iterations; iter++) {
    const temp = 20 * (1 - iter / iterations);
    // Repulsion
    for (let i = 0; i < nodes.length; i++) {
      let fx = 0, fy = 0;
      const pi = pos[nodes[i].node_id];
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        const pj = pos[nodes[j].node_id];
        const dx = pi.x - pj.x, dy = pi.y - pj.y;
        const d = Math.max(Math.sqrt(dx*dx + dy*dy), 0.01);
        const f = (k * k) / d;
        fx += (dx / d) * f; fy += (dy / d) * f;
      }
      pi.vx = (pi.vx + fx) * 0.5; pi.vy = (pi.vy + fy) * 0.5;
    }
    // Attraction
    edgeSet.forEach(({ s, d }) => {
      const ps = pos[s], pd = pos[d];
      if (!ps || !pd) return;
      const dx = pd.x - ps.x, dy = pd.y - ps.y;
      const dist = Math.max(Math.sqrt(dx*dx + dy*dy), 0.01);
      const f = (dist * dist) / k;
      const fx = (dx / dist) * f, fy = (dy / dist) * f;
      ps.vx += fx; ps.vy += fy; pd.vx -= fx; pd.vy -= fy;
    });
    // Apply + clamp to canvas
    nodes.forEach(n => {
      const p = pos[n.node_id];
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      if (speed > temp) { p.vx = p.vx/speed*temp; p.vy = p.vy/speed*temp; }
      p.x = Math.max(40, Math.min(width-40,  p.x + p.vx));
      p.y = Math.max(30, Math.min(height-30, p.y + p.vy));
    });
  }
  return pos;
}

function GraphCanvas({ graphData }) {
  const W = 780, H = 380;
  const typeColors = { agent:"#6366f1", issuer:"#f59e0b", verifier:"#ef4444", tool:"#10b981", workload:"#3b82f6", tenant:"#8b5cf6" };
  const [hovered, setHovered] = useState(null);

  if (!graphData || !graphData.nodes || graphData.nodes.length === 0) {
    return h("div",{style:{textAlign:"center",padding:"60px 0",color:"var(--muted)"}},
      h("div",{style:{fontSize:40,marginBottom:8}},"🕸"),
      h("div",{style:{fontSize:14}},"Graph empty — run demo_seed.py to populate"),
    );
  }

  const pos = forceLayout(graphData.nodes, graphData.edges, W, H, 120);

  return h("svg", { width:"100%", viewBox:`0 0 ${W} ${H}`,
    style:{display:"block",background:"var(--surface2)",borderRadius:8,overflow:"visible"} },
    // Arrow marker
    h("defs", null,
      h("marker",{id:"arr",markerWidth:8,markerHeight:6,refX:14,refY:3,orient:"auto"},
        h("polygon",{points:"0 0, 8 3, 0 6",fill:"#475569"})
      ),
    ),
    // Edges
    graphData.edges.map((e, i) => {
      const ps = pos[e.src_node], pd = pos[e.dst_node];
      if (!ps || !pd) return null;
      const isHov = hovered === e.src_node || hovered === e.dst_node;
      return h("line", { key:i, x1:ps.x, y1:ps.y, x2:pd.x, y2:pd.y,
        stroke: isHov ? "#94a3b8" : "#334155",
        strokeWidth: isHov ? 1.5 : 1,
        markerEnd: "url(#arr)",
        style: { transition: "stroke .2s" },
      });
    }),
    // Edge labels (only on hover)
    graphData.edges.map((e, i) => {
      const ps = pos[e.src_node], pd = pos[e.dst_node];
      if (!ps || !pd) return null;
      if (hovered !== e.src_node && hovered !== e.dst_node) return null;
      return h("text", { key:`el${i}`, x:(ps.x+pd.x)/2, y:(ps.y+pd.y)/2-4,
        fontSize:9, fill:"#94a3b8", textAnchor:"middle", style:{pointerEvents:"none"}
      }, e.edge_type?.replace(/_/g," "));
    }),
    // Nodes
    graphData.nodes.map(n => {
      const p = pos[n.node_id];
      if (!p) return null;
      const col = typeColors[n.node_type] || "#6366f1";
      const r = n.node_type === "agent" ? 18 : 13;
      const isHov = hovered === n.node_id;
      const shortLabel = (n.label || "").replace(/^attest:/, "").replace(/@.*/, "").slice(0, 16);
      return h("g", { key:n.node_id,
        style:{cursor:"pointer"},
        onMouseEnter: () => setHovered(n.node_id),
        onMouseLeave: () => setHovered(null),
      },
        // Glow ring on hover
        isHov && h("circle",{ cx:p.x, cy:p.y, r:r+6, fill:col, opacity:.15 }),
        h("circle",{ cx:p.x, cy:p.y, r, fill:col, opacity: isHov ? 1 : 0.85,
          stroke: isHov ? "white" : col, strokeWidth: isHov ? 2 : 0,
          style:{ transition:"all .15s" }
        }),
        // Icon letter
        h("text",{ x:p.x, y:p.y+1, textAnchor:"middle", dominantBaseline:"middle",
          fontSize: r > 14 ? 10 : 8, fill:"white", fontWeight:700,
          style:{pointerEvents:"none",userSelect:"none"}
        }, n.node_type[0].toUpperCase()),
        // Label below node
        h("text",{ x:p.x, y:p.y+r+12, textAnchor:"middle",
          fontSize:9, fill: isHov ? "var(--text)" : "var(--muted)",
          style:{pointerEvents:"none",transition:"fill .15s"}
        }, shortLabel),
        // Tooltip on hover
        isHov && h("g",{style:{pointerEvents:"none"}},
          h("rect",{x:p.x+r+4,y:p.y-22,width:160,height:42,rx:5,fill:"#1e293b",stroke:"#334155",strokeWidth:1}),
          h("text",{x:p.x+r+12,y:p.y-7,fontSize:10,fill:"white",fontWeight:600},n.label?.slice(0,22)+(n.label?.length>22?"…":"")),
          h("text",{x:p.x+r+12,y:p.y+8,fontSize:9,fill:col},n.node_type, " · obs:", n.observation_count||0),
        ),
      );
    }),
    // Legend
    Object.entries(typeColors).filter(([t]) => graphData.nodes.some(n=>n.node_type===t)).map(([t,c],i) =>
      h("g",{key:t,transform:`translate(${10 + i * 90}, ${H-12})`},
        h("circle",{cx:5,cy:0,r:4,fill:c,opacity:.85}),
        h("text",{x:12,y:4,fontSize:9,fill:"var(--muted)"},t),
      )
    ),
  );
}

function RiskSparkline({ events }) {
  const W = 600, H = 60;
  if (!events || events.length < 2) return null;
  const scores = events.map(e => (e.threat || {}).risk_score ?? 0);
  const xScale = i => (i / (scores.length - 1)) * W;
  const yScale = s => H - (s / 100) * H;
  const pts = scores.map((s, i) => `${xScale(i)},${yScale(s)}`).join(" ");
  const polyPts = `0,${H} ` + pts + ` ${W},${H}`;
  const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
  const lineColor = avg >= 70 ? "#ef4444" : avg >= 40 ? "#f59e0b" : "#10b981";
  const fillColor = avg >= 70 ? "rgba(239,68,68,.2)" : avg >= 40 ? "rgba(245,158,11,.15)" : "rgba(16,185,129,.12)";
  return h("svg", { viewBox: `0 0 ${W} ${H}`, width: "100%", height: H, preserveAspectRatio: "none",
    style: { display: "block", borderRadius: 4 } },
    h("polygon", { points: polyPts, fill: fillColor }),
    h("polyline", { points: pts, fill: "none", stroke: lineColor, strokeWidth: 2, strokeLinejoin: "round" }),
  );
}

                    h("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },

                      h("div", null, h("div", { style: { fontSize: 10, color: "var(--muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".7px", marginBottom: 3 } }, "Channel"), h("div", { style: { color: "var(--green)", fontWeight: 700 } }, "encrypted")),
                      h("div", null, h("div", { style: { fontSize: 10, color: "var(--muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".7px", marginBottom: 3 } }, "Graph Nodes"), h("div", { className: "mono", style: { fontSize: 12 } }, `${d.nodes_before} \u2192 ${d.nodes_after}`)),
                      h("div", null, h("div", { style: { fontSize: 10, color: "var(--muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".7px", marginBottom: 3 } }, "Graph Edges"), h("div", { className: "mono", style: { fontSize: 12 } }, `${d.edges_before} \u2192 ${d.edges_after}`)),
                    ),
                  );
                },
              },
            ].map((step, i) => {
              const stepNum = i + 1;
              const isVisible = simVisStep >= stepNum;
              return h("div", { key: i, className: "ztix-step",
                style: { opacity: isVisible ? 1 : 0, transition: `opacity .4s ease` },
              },
                h("div", { className: "ztix-step-line" },
                  h("div", { className: `ztix-step-num${isVisible ? " active" : ""}` }, stepNum),
                  i < 4 && h("div", { className: "ztix-step-connector" }),
                ),
                h("div", { className: "ztix-step-body" },
                  h("div", { className: "ztix-step-title" }, step.title),
                  h("div", { className: "ztix-step-desc" }, step.desc),
                  isVisible && step.content(),
                ),
              );
            })
          ),
        ),
      ),
    ),
  );
}

// ── Upsell modal — listens for tokendna:upsell events from apiFetch ───────────
function UpsellModal() {
  const [detail, setDetail] = useState(null);
  useEffect(() => {
    const onUpsell = e => setDetail(e.detail);
    window.addEventListener("tokendna:upsell", onUpsell);
    return () => window.removeEventListener("tokendna:upsell", onUpsell);
  }, []);
  if (!detail) return null;
  const close = () => setDetail(null);
  const onBackdrop = e => { if (e.target === e.currentTarget) close(); };
  const upgradeHref = detail.upgrade_url || "/billing/upgrade";
  return h("div", { className: "upsell-overlay", onClick: onBackdrop },
    h("div", { className: "upsell-modal", role: "dialog", "aria-modal": "true" },
      h("div", { className: "upsell-eyebrow" }, "Enterprise Feature"),
      h("div", { className: "upsell-title" }, detail.feature_name || detail.feature),
      h("div", { className: "upsell-message" }, detail.message),
      h("div", { className: "upsell-tiers" },
        h("div", { className: "upsell-tier-pill" },
          h("div", { className: "upsell-tier-label" }, "Your tier"),
          h("div", { className: "upsell-tier-value" }, detail.tenant_tier || "—"),
        ),
        h("div", { className: "upsell-tier-pill required" },
          h("div", { className: "upsell-tier-label" }, "Required"),
          h("div", { className: "upsell-tier-value" }, detail.required_tier || "—"),
        ),
      ),
      h("div", { className: "upsell-actions" },
        h("button", { className: "upsell-btn", onClick: close }, "Not now"),
        h("a", { className: "upsell-btn primary", href: upgradeHref }, "Upgrade"),
      ),
    ),
  );
}
