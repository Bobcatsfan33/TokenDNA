<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aegis Security Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<style>
  :root {
    --bg:       #0a0d14;
    --surface:  #111827;
    --surface2: #1a2233;
    --border:   #1e293b;
    --accent:   #3b82f6;
    --accent2:  #6366f1;
    --green:    #10b981;
    --yellow:   #f59e0b;
    --orange:   #f97316;
    --red:      #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --font:     'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  a { color: var(--accent); text-decoration: none; }

  /* Layout */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
  .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 50; }
  .content { padding: 24px; flex: 1; }

  /* Sidebar */
  .logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .nav-section { padding: 12px 0 4px; }
  .nav-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: var(--muted); font-size: 13px; border-left: 3px solid transparent; transition: all .15s; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,.07); }
  .nav-icon { width: 16px; text-align: center; font-size: 15px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .card-header { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .card-body { padding: 16px 20px 20px; }

  /* Grid */
  .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 700px)  { .grid-4, .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* Stat cards */
  .stat-card { padding: 20px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 700; line-height: 1; }
  .stat-delta { font-size: 11px; margin-top: 6px; color: var(--muted); }
  .stat-delta.up   { color: var(--red); }
  .stat-delta.down { color: var(--green); }

  /* Risk tier badges */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .badge-allow  { background: rgba(16,185,129,.15); color: var(--green); }
  .badge-stepup { background: rgba(245,158,11,.15); color: var(--yellow); }
  .badge-block  { background: rgba(249,115,22,.15); color: var(--orange); }
  .badge-revoke { background: rgba(239,68,68,.15); color: var(--red); }
  .badge-ok     { background: rgba(16,185,129,.15); color: var(--green); }
  .badge-warn   { background: rgba(245,158,11,.15); color: var(--yellow); }
  .badge-crit   { background: rgba(239,68,68,.15); color: var(--red); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }

  /* Progress / score bar */
  .score-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width .4s; }

  /* Feed */
  .feed-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .feed-item:last-child { border-bottom: none; }
  .feed-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .feed-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* Status indicator */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.red    { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .status-dot.yellow { background: var(--yellow); }

  /* Buttons */
  .btn { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn:hover   { opacity: .85; }

  /* Inputs */
  input, select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 12px; font-size: 13px; outline: none; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
  .form-group { margin-bottom: 14px; }

  /* Code box */
  .code-box { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; font-family: 'Fira Mono', monospace; font-size: 12px; color: #7dd3fc; overflow-x: auto; }

  /* Onboarding steps */
  .step { display: flex; gap: 16px; margin-bottom: 24px; }
  .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .step-num.done { background: var(--green); }
  .step-content h4 { margin-bottom: 6px; font-size: 14px; }
  .step-content p  { color: var(--muted); line-height: 1.5; font-size: 13px; }

  /* Misc */
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .section-sub   { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .mt16 { margin-top: 16px; }
  .mt24 { margin-top: 24px; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap8 { gap: 8px; }
  .gap16 { gap: 16px; }
  .ml-auto { margin-left: auto; }
  .text-muted { color: var(--muted); }
  .text-green  { color: var(--green); }
  .text-red    { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .font-mono { font-family: 'Fira Mono', monospace; font-size: 12px; }
  .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
</style>
</head>
<body>
<div id="root"></div>
<script>

// ── Utilities ────────────────────────────────────────────────────────────────
function tierBadge(tier) {
  const map = { ALLOW: "allow", STEP_UP: "stepup", BLOCK: "block", REVOKE: "revoke" };
  return React.createElement("span", { className: `badge badge-${map[tier] || "allow"}` }, tier);
}

function severityBadge(s) {
  const map = { CRITICAL: "revoke", HIGH: "block", MEDIUM: "stepup", LOW: "allow" };
  return React.createElement("span", { className: `badge badge-${map[s] || "allow"}` }, s);
}

function scoreColor(score) {
  if (score >= 70) return "#10b981";
  if (score >= 50) return "#f59e0b";
  if (score >= 30) return "#f97316";
  return "#ef4444";
}

            )

      ),

      React.createElement("div", { className: "card" },
        React.createElement("div", { className: "card-header" },
          React.createElement("span", { className: "card-title" }, "Threat Signal Breakdown"),

        React.createElement("div", { className: "card-body" },
          MOCK.threat_breakdown.map(t =>
            React.createElement("div", { key: t.name, style: { marginBottom: 10 } },

            )

    ),

    // Live event feed
    React.createElement("div", { className: "card mt16" },

function ScanPage() {
  return React.createElement("div", null,
