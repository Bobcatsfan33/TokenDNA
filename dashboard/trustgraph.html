<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TokenDNA — Trust Graph Explorer</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<style>
  :root{--bg:#0b0d10;--panel:#14181d;--line:#1f262e;--text:#e6e8eb;--muted:#8a939c;
    --accent:#3aa9ff;--low:#34d399;--medium:#f59e0b;--high:#fb923c;--critical:#ef4444}
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  header{border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .logo{font-weight:700}.logo .dot{color:var(--accent)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--muted);padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600}
  .seg button.active{background:var(--accent);color:#00131f}
  .seg button:not(:last-child){border-right:1px solid var(--line)}
  select,header a{background:#0f1318;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:13px}
  header a{text-decoration:none;color:var(--accent)}
  .mode-hint{color:var(--muted);font-size:12px}
  .counts{margin-left:auto;color:var(--muted);font-size:12px}
  main{display:flex;height:calc(100vh - 49px)}
  #cy{flex:1}
  aside{width:340px;border-left:1px solid var(--line);background:var(--panel);overflow:auto;padding:16px}
  aside h2{font-size:15px;margin:0 0 2px}aside .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}.row span:first-child{color:var(--muted)}
  .an{border-left:3px solid var(--critical);background:#0f1318;border-radius:6px;padding:8px 10px;margin:8px 0;font-size:12px}
  .an .t{font-weight:700;color:var(--high)}
  .pill{padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
  .pill.low{background:rgba(52,211,153,.15);color:var(--low)}
  .pill.medium{background:rgba(245,158,11,.15);color:var(--medium)}
  .pill.high{background:rgba(251,146,60,.15);color:var(--high)}
  .pill.critical{background:rgba(239,68,68,.15);color:var(--critical)}
  .legend{position:absolute;bottom:12px;left:12px;background:rgba(20,24,29,.92);border:1px solid var(--line);
    border-radius:8px;padding:9px 11px;font-size:11px}
  .legend .i{display:flex;align-items:center;gap:6px;margin:2px 0}.legend .d{width:10px;height:10px;border-radius:50%}
  .empty{color:var(--muted);text-align:center;margin-top:40px;font-size:13px}
  .banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(20,24,29,.95);
    border:1px solid var(--accent);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--text);display:none}
</style>
</head>
<body>
<header>
  <span class="logo">Token<span class="dot">DNA</span> · Trust Graph</span>
  <div class="seg" id="seg">
    <button data-mode="nodes" class="active">Nodes</button>
    <button data-mode="edges">Edges</button>
    <button data-mode="anomalies">Anomalies</button>
    <button data-mode="correlate">Correlate</button>
  </div>
  <select id="typeFilter"><option value="">all types</option></select>
  <span class="mode-hint" id="hint"></span>
  <a href="/demo">▸ Demo</a><a href="/console">▸ Kill Graph</a>
  <span class="counts" id="counts"></span>
</header>
<main>
  <div id="cy"></div>
  <div class="banner" id="banner"></div>
  <div class="legend" id="legend"></div>
  <aside id="panel"><div class="empty">Pick a view above.<br>Each view shows one dimension cleanly;<br><b>Correlate</b> shows one element's neighborhood.</div></aside>
</main>
<script>
"use strict";
const API="";
const TOKEN=localStorage.getItem("tokendna_token")||"";
function headers(){return Object.assign({"Content-Type":"application/json"},TOKEN?{"Authorization":"Bearer "+TOKEN}:{});}
cytoscape.use(window.cytoscapeDagre);

const TYPE_COLORS={agent:"#a78bfa",workload:"#60a5fa",tool:"#38bdf8",mcp_server:"#f472b6",
  issuer:"#fbbf24",verifier:"#34d399",tenant:"#8a939c",lifecycle_state:"#94a3b8",policy:"#fb923c"};
const SEV={low:"#34d399",medium:"#f59e0b",high:"#fb923c",critical:"#ef4444"};

let cy, ANOM=[], anomByLabel={}, mode="nodes";

cy = cytoscape({container:document.getElementById("cy"), wheelSensitivity:.2,
  style:[
    {selector:"node",style:{"background-color":e=>TYPE_COLORS[e.data("nt")]||"#8a939c",
      "label":"data(label)","color":"#cbd5e1","font-size":"9px","text-valign":"bottom","text-margin-y":3,
      "width":18,"height":18}},
    {selector:"node.anom",style:{"border-width":4,"border-color":e=>e.data("sev")||"#ef4444","width":26,"height":26}},
    {selector:"node.faded",style:{"opacity":.08}},
    {selector:"node.hot",style:{"opacity":1,"width":30,"height":30,"border-width":3,"border-color":"#3aa9ff"}},
    {selector:"edge",style:{"width":1.2,"line-color":"#2a323b","target-arrow-color":"#2a323b",
      "target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":.7,"label":"","font-size":"8px","color":"#64748b"}},
    {selector:"edge.show",style:{"line-color":"#3a4654","target-arrow-color":"#3a4654"}},
    {selector:"edge.faded",style:{"opacity":.04}},
    {selector:"edge.hot",style:{"opacity":1,"width":2.4,"line-color":"#3aa9ff","target-arrow-color":"#3aa9ff","label":"data(et)"}},
    {selector:".hidden",style:{"display":"none"}},
  ]});

document.getElementById("legend").innerHTML=Object.entries(
  {agent:"Agent",tool:"Tool",mcp_server:"MCP",issuer:"Issuer",verifier:"Verifier",workload:"Workload"})
  .map(([k,v])=>`<div class="i"><span class="d" style="background:${TYPE_COLORS[k]}"></span>${v}</div>`).join("");

async function load(){
  const g=await (await fetch(API+"/api/graph/data",{headers:headers()})).json();
  const an=await (await fetch(API+"/api/graph/anomalies",{headers:headers()})).json();
  ANOM=(an.anomalies||an||[]);
  anomByLabel={}; ANOM.forEach(a=>{(anomByLabel[a.subject_node]=anomByLabel[a.subject_node]||[]).push(a);});
  const types=new Set();
  const els=[];
  (g.nodes||[]).forEach(n=>{
    types.add(n.node_type);
    const al=anomByLabel[n.label]||[];
    const sev=al.length?al.map(a=>a.severity).sort((x,y)=>rank(y)-rank(x))[0]:null;
    els.push({data:{id:n.node_id,label:n.label,nt:n.node_type,anom:al.length>0,sev:sev?SEV[sev]:null}});
  });
  (g.edges||[]).forEach(e=> els.push({data:{id:e.src_node+"->"+e.dst_node+":"+e.edge_type,
    source:e.src_node,target:e.dst_node,et:e.edge_type}}));
  cy.add(els);
  const sel=document.getElementById("typeFilter");
  [...types].sort().forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;sel.appendChild(o);});
  document.getElementById("counts").textContent=`${(g.nodes||[]).length} nodes · ${(g.edges||[]).length} edges · ${ANOM.length} anomalies`;
  apply();
}
function rank(s){return {low:1,medium:2,high:3,critical:4}[s]||0;}

document.getElementById("seg").onclick=e=>{
  if(e.target.dataset.mode){mode=e.target.dataset.mode;
    document.querySelectorAll("#seg button").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
    apply();}
};
document.getElementById("typeFilter").onchange=apply;

function apply(){
  const tf=document.getElementById("typeFilter").value;
  const banner=document.getElementById("banner");
  cy.elements().removeClass("hidden faded hot anom show");
  banner.style.display="none";
  // type filter (applies to all modes)
  if(tf) cy.nodes().forEach(n=>{ if(n.data("nt")!==tf) n.addClass("hidden"); });

  if(mode==="nodes"){
    setHint("All nodes, grouped by type — no edges, no overlap.");
    cy.edges().addClass("hidden");
    runLayout("grid");
  } else if(mode==="edges"){
    setHint("Relationship topology — edges and the nodes they connect.");
    cy.edges().not(".hidden").addClass("show");
    runLayout("dagre");
  } else if(mode==="anomalies"){
    setHint("Only anomalous nodes and the anomalies on them.");
    cy.nodes().forEach(n=>{ if(!n.data("anom")) n.addClass("hidden"); else n.addClass("anom"); });
    cy.edges().forEach(e=>{ if(e.source().hasClass("hidden")||e.target().hasClass("hidden")) e.addClass("hidden"); else e.addClass("show"); });
    renderAnomalyList();
    runLayout("cose");
  } else { // correlate
    setHint("Click any node — see only its edges, neighbors, and anomalies.");
    cy.elements().addClass("faded");
    cy.edges().addClass("hidden");
    banner.style.display="block"; banner.textContent="Correlate mode — click a node to focus its neighborhood";
    renderAnomalyList();
  }
}
function setHint(t){document.getElementById("hint").textContent=t;}

let layoutMode=null;
function runLayout(kind){
  const opts = kind==="grid" ? {name:"grid",condense:true,avoidOverlap:true,
      sort:(a,b)=>(a.data("nt")||"").localeCompare(b.data("nt")||"")}
    : kind==="dagre" ? {name:"dagre",rankDir:"LR",nodeSep:18,rankSep:60}
    : {name:"cose",animate:false,nodeRepulsion:9000,idealEdgeLength:60};
  cy.layout(Object.assign({fit:true,padding:30}, opts)).run();
  layoutMode=kind;
}

cy.on("tap","node",ev=>{
  const n=ev.target;
  showNode(n);
  if(mode==="correlate"){
    cy.elements().addClass("faded").removeClass("hot");
    cy.edges().addClass("hidden");
    const hood=n.closedNeighborhood();
    hood.removeClass("faded hidden").addClass("hot");
    hood.nodes().forEach(x=>{ if(anomByLabel[x.data("label")]) x.addClass("anom"); });
    document.getElementById("banner").style.display="none";
  }
});

function showNode(n){
  const label=n.data("label"); const al=anomByLabel[label]||[];
  const deg=n.connectedEdges().length;
  document.getElementById("panel").innerHTML=
    `<h2>${label}</h2><div class="sub">${n.data("nt")}</div>
     <div class="row"><span>Connections</span><span>${deg}</span></div>
     <div class="row"><span>Anomalies</span><span>${al.length}</span></div>`+
    al.map(a=>`<div class="an"><div class="t">${a.anomaly_type} <span class="pill ${a.severity}">${a.severity}</span></div>${a.detail||""}</div>`).join("");
}

function renderAnomalyList(){
  const top=[...ANOM].sort((a,b)=>rank(b.severity)-rank(a.severity)).slice(0,20);
  document.getElementById("panel").innerHTML=
    `<h2>Anomalies</h2><div class="sub">${ANOM.length} total — click one to focus its node</div>`+
    top.map(a=>`<div class="an" data-label="${a.subject_node}" style="cursor:pointer">
      <div class="t">${a.anomaly_type} <span class="pill ${a.severity}">${a.severity}</span></div>
      <div style="color:var(--muted)">${a.subject_node}</div>${a.detail||""}</div>`).join("");
  document.querySelectorAll(".an[data-label]").forEach(el=> el.onclick=()=>{
    const node=cy.nodes().filter(n=>n.data("label")===el.dataset.label).first();
    if(node && node.length){ cy.animate({center:{eles:node},zoom:1.4},{duration:300});
      node.addClass("hot"); showNode(node); }
  });
}

load().catch(e=>{document.getElementById("panel").innerHTML='<div class="empty">Graph unavailable — start with scripts/demo.sh and seed data.</div>';});
</script>
</body>
</html>
