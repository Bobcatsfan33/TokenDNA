# REFERENCE COPY of Bobcatsfan33/.github/.github/workflows/security-reusable.yml
# The org repo Bobcatsfan33/.github is the source of truth; this copy exists so
# docs/governance/SECURITY_WORKFLOW.md stands alone and can bootstrap the org repo.
#
# Org-level reusable security workflow. Each repo calls this with its image
# name; one place to maintain SBOM, scanning, signing, and provenance.
name: security-suite

on:
  workflow_call:
    inputs:
      image:
        description: "Fully qualified image, e.g. ghcr.io/bobcatsfan33/tokendna"
        required: true
        type: string
      languages:
        description: "CodeQL languages as a JSON array, e.g. [\"python\",\"go\"]"
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile to build and scan"
        required: false
        type: string
        default: "Dockerfile"

permissions:
  contents: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  build-scan-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write        # cosign keyless (Fulcio) + SLSA provenance
      attestations: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (digest-addressed)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ inputs.image }}:${{ github.sha }}
          provenance: false   # we attach SLSA provenance explicitly below

      - name: Trivy scan (gate on HIGH/CRITICAL, respect .trivyignore)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ inputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Generate CycloneDX SBOM (source + image)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output-format JSON \
            --output-file sbom-source.cdx.json || true
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b ./bin
          ./bin/syft ${{ inputs.image }}:${{ github.sha }} -o cyclonedx-json=sbom-image.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image + attest SBOM (keyless, OIDC identity = this workflow)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign ${{ inputs.image }}@${{ steps.push.outputs.digest }}
          cosign attest --predicate sbom-image.cdx.json --type cyclonedx \
            ${{ inputs.image }}@${{ steps.push.outputs.digest }}

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-*.cdx.json
          retention-days: 90

  provenance:
    if: github.event_name != 'pull_request'
    needs: build-scan-sign
    permissions:
      actions: read
      id-token: write
      packages: write
    # SLSA v1 build-level provenance, verifiable with slsa-verifier
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ inputs.image }}
      digest: ${{ needs.build-scan-sign.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
