{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tokendna.fullname" . }}
  labels: {{- include "tokendna.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "tokendna.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- range .Values.networkPolicy.ingressNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - protocol: TCP
          port: 8000
    {{- end }}
  egress:
    # DNS — required for KMS / OTel / Sentry endpoints to resolve.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # External egress (Postgres, KMS, OTel, Sentry) — tighten to a managed
    # service CIDR list in production.
    {{- range .Values.networkPolicy.egressCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . }}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
